schema_version: "1.1"
datasets:
  core_synthetic:
    enabled: true
    bundled: true
    data_class: synthetic
    vcf: inst/extdata/validation/core_validation.vcf
    metadata: inst/extdata/validation/core_validation_metadata.tsv
    purpose: deterministic QC, LD, diversity, PCA, IBS, and FST validation
  local_representative:
    enabled: false
    bundled: false
    data_class: private_real_data
    vcf: null
    metadata: null
    license: private
    approval: local_only
    purpose: application-specific validation supplied outside the package
  first_public_canonical_candidate:
    enabled: false
    bundled: false
    data_class: public_real_data
    approval: candidate
    descriptor: null
    source_url: null
    version: null
    citation: null
    license: null
    sha256_inventory: null
    reviewed_by: null
    reviewed_at: null
    purpose: first independently licensed public canonical panel
    activation_requirements:
      - immutable source and release version
      - verified redistribution and analysis license
      - complete citation and provenance metadata
      - SHA-256 checksum for every materialized file
      - scientific review approval
