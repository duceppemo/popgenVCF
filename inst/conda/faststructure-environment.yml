name: popgenvcf-faststructure
channels:
  - conda-forge
  - nodefaults
dependencies:
  # fastStructure is isolated from the modern R environment because current
  # native/Bioconda builds have older Python and compiled-library constraints.
  - python=3.10
  - numpy<2
  - scipy
  - cython<3
  - gsl
  - compilers
  - make
  - git
  - pip
  - setuptools
