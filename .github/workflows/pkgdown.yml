name: pkgdown

on:
  pull_request:
    paths:
      - "R/**"
      - "man/**"
      - "vignettes/**"
      - "README.md"
      - "NEWS.md"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "_pkgdown.yml"
      - ".github/workflows/pkgdown.yml"
  push:
    branches: [main]
    paths:
      - "R/**"
      - "man/**"
      - "vignettes/**"
      - "README.md"
      - "NEWS.md"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "_pkgdown.yml"
      - ".github/workflows/pkgdown.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: true

env:
  PKGDOWN_DEST: _pkgdown-site

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: |
            any::pkgdown
            any::rmarkdown
            any::knitr
          needs: website

      - name: Validate pkgdown configuration
        shell: Rscript {0}
        run: |
          pkgdown::check_pkgdown(".")

      - name: Build pkgdown site
        shell: bash
        run: |
          set -o pipefail
          Rscript -e 'pkgdown::build_site_github_pages(pkg = ".", dest_dir = Sys.getenv("PKGDOWN_DEST"), clean = TRUE, install = TRUE, new_process = FALSE, examples = FALSE, quiet = FALSE)' 2>&1 | tee pkgdown-build.log

      - name: Validate generated site
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "$PKGDOWN_DEST/index.html"
            "$PKGDOWN_DEST/reference/index.html"
            "$PKGDOWN_DEST/articles/index.html"
            "$PKGDOWN_DEST/articles/reproducibility.html"
            "$PKGDOWN_DEST/articles/containers-and-hpc.html"
            "$PKGDOWN_DEST/authors.html"
          )
          for path in "${required[@]}"; do
            [[ -s "$path" ]] || {
              echo "::error::Missing or empty pkgdown output: $path"
              exit 1
            }
          done
          grep -q "popgenVCF" "$PKGDOWN_DEST/index.html"
          grep -q "Computational reproducibility" "$PKGDOWN_DEST/articles/reproducibility.html"

      - name: Upload diagnostic site artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pkgdown-diagnostics
          path: |
            _pkgdown-site/
            pkgdown-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _pkgdown-site/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
