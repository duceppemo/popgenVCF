name: Container

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "inst/conda/**"
      - "inst/scripts/install-bioconductor.R"
      - "popgenVCF.R"
      - ".github/workflows/container.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the image to GHCR
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: container-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: duceppemo/popgenvcf

jobs:
  build:
    name: Build, verify, and publish OCI image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Resolve source revision
        id: source
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ -n "$RELEASE_TAG" ]]; then
            echo "ref=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "version=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ steps.source.outputs.ref }}
          fetch-depth: 0

      - name: Verify release identity
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(sed -n 's/^Version:[[:space:]]*//p' DESCRIPTION)"
          test "$RELEASE_TAG" = "v${package_version}"
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=ci,enable=${{ github.event_name == 'pull_request' }}
          labels: |
            org.opencontainers.image.title=popgenVCF
            org.opencontainers.image.description=Reproducible population-genomics toolkit for VCF data
            org.opencontainers.image.vendor=Marc-Olivier Duceppe
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.source.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Build pull-request image
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.publish)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: popgenvcf:ci
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.source.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test pull-request image
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.publish)
        run: |
          docker run --rm popgenvcf:ci Rscript -e 'cat(as.character(packageVersion("popgenVCF")), "\n")'
          docker run --rm popgenvcf:ci --help
          docker run --rm popgenvcf:ci Rscript -e '
            core <- popgenVCF::run_scientific_validation(integration = TRUE, threads = 4)
            structure <- popgenVCF::run_population_structure_validation(integration = TRUE)
            stopifnot(core$passed, structure$passed)
          '

      - name: Build and publish image
        id: publish
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.source.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Verify the published image by digest
        if: steps.publish.outputs.digest != ''
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          image="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          docker pull --platform linux/amd64 "$image"
          docker run --rm --platform linux/amd64 "$image" Rscript -e '
            expected <- read.dcf("/opt/popgenVCF/DESCRIPTION")[1, "Version"]
            stopifnot(as.character(packageVersion("popgenVCF")) == expected)
          '
          docker run --rm --platform linux/amd64 "$image" --help
          docker run --rm --platform linux/amd64 "$image" Rscript -e '
            core <- popgenVCF::run_scientific_validation(integration = TRUE, threads = 4)
            structure <- popgenVCF::run_population_structure_validation(integration = TRUE)
            stopifnot(core$passed, structure$passed)
          '

      - name: Write container metadata
        if: steps.publish.outputs.digest != ''
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          VERSION: ${{ steps.source.outputs.version }}
        run: |
          mkdir -p release-container
          jq -n \
            --arg schema_version "1.0" \
            --arg image "${REGISTRY}/${IMAGE_NAME}" \
            --arg digest "$DIGEST" \
            --arg version "$VERSION" \
            --arg git_commit "$(git rev-parse HEAD)" \
            --arg release_tag "${{ github.event.release.tag_name }}" \
            --argjson tags "$(printf '%s\n' "$TAGS" | jq -Rsc 'split("\n") | map(select(length > 0))')" \
            '{schema_version: $schema_version, record_type: "popgenvcf_oci_release", image: $image, digest: $digest, version: $version, release_tag: $release_tag, git_commit: $git_commit, tags: $tags}' \
            > release-container/container-metadata.json
          printf '%s  %s\n' "$DIGEST" "${REGISTRY}/${IMAGE_NAME}" > release-container/container-digest.txt

      - name: Upload container metadata artifact
        if: steps.publish.outputs.digest != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-release-metadata
          path: release-container/
          if-no-files-found: error

      - name: Attach metadata to GitHub Release
        if: github.event_name == 'release' && steps.publish.outputs.digest != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            release-container/container-metadata.json \
            release-container/container-digest.txt \
            --clobber

      - name: Publish image summary
        if: steps.publish.outputs.digest != ''
        run: |
          {
            echo "## Published OCI image"
            echo
            echo "**Digest:** \`${{ steps.publish.outputs.digest }}\`"
            echo
            echo '```text'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
