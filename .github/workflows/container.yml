name: Container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "inst/conda/**"
      - "inst/scripts/install-bioconductor.R"
      - "popgenVCF.R"
      - ".github/workflows/container.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build, validate, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=popgenVCF
            org.opencontainers.image.description=Reproducible population-genomics toolkit for VCF data
            org.opencontainers.image.vendor=Marc-Olivier Duceppe

      - name: Build pull-request image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: popgenvcf:ci
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test pull-request image
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm popgenvcf:ci Rscript -e 'cat(as.character(packageVersion("popgenVCF")), "\n")'
          docker run --rm popgenvcf:ci --help
          docker run --rm popgenvcf:ci Rscript -e '
            core <- popgenVCF::run_scientific_validation(integration = TRUE, threads = 4)
            structure <- popgenVCF::run_population_structure_validation(integration = TRUE)
            stopifnot(core$passed, structure$passed)
          '

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Publish image summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Published container"
            echo
            echo '```text'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
