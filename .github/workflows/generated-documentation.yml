name: Generated documentation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: any::roxygen2
          needs: check

      - name: Verify roxygen ownership
        run: |
          python3 tools/reconcile-roxygen-owners.py
          python3 tools/reconcile-legacy-public-exports.py

      - name: Verify generated namespace ownership
        run: |
          test "$(head -n 1 NAMESPACE)" = '# Generated by roxygen2: do not edit by hand'

      - name: Regenerate namespace and Rd files
        run: Rscript -e 'roxygen2::roxygenise(".", roclets = c("namespace", "rd"))'

      - name: Reconcile retained grouped manuals
        run: python3 tools/reconcile-rd-aliases.py --write

      - name: Archive generated documentation
        if: always()
        run: |
          mkdir -p artifacts/generated-documentation/man
          cp NAMESPACE artifacts/generated-documentation/NAMESPACE
          cp man/*.Rd artifacts/generated-documentation/man/
          git diff -- NAMESPACE man > artifacts/generated-documentation/generated-documentation.diff || true

      - name: Verify generated documentation is committed
        run: |
          python3 tools/reconcile-rd-aliases.py
          git diff --exit-code -- NAMESPACE man

      - name: Upload generated documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: generated-documentation
          path: artifacts/generated-documentation
          if-no-files-found: error
