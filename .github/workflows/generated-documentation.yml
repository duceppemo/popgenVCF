name: Generated documentation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generated-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::roxygen2
          needs: check

      - name: Reconcile roxygen ownership
        run: |
          python3 tools/reconcile-roxygen-owners.py --write
          python3 tools/reconcile-legacy-public-exports.py --write

      - name: Regenerate namespace and Rd files
        run: Rscript -e 'roxygen2::roxygenise(".", roclets = c("namespace", "rd"))'

      - name: Publish legacy export reconciliation to PR 287
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 287 &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R NAMESPACE man
          if git diff --cached --quiet; then
            echo "Generated documentation is already committed."
          else
            git commit -m "Restore legacy public API documentation"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Archive generated documentation
        if: always()
        run: |
          mkdir -p artifacts/generated-documentation/man
          cp NAMESPACE artifacts/generated-documentation/NAMESPACE
          cp man/*.Rd artifacts/generated-documentation/man/
          git diff -- NAMESPACE man > artifacts/generated-documentation/generated-documentation.diff || true

      - name: Verify generated documentation is committed
        run: |
          python3 tools/reconcile-roxygen-owners.py
          python3 tools/reconcile-legacy-public-exports.py
          git diff --exit-code -- R NAMESPACE man

      - name: Upload generated documentation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-documentation
          path: artifacts/generated-documentation
          if-no-files-found: error
