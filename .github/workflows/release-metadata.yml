name: Release metadata

on:
  pull_request:
    paths:
      - "DESCRIPTION"
      - "LICENSE"
      - "CITATION.cff"
      - "codemeta.json"
      - "inst/CITATION"
      - "inst/metadata/software-identity.json"
      - "R/software_identity.R"
      - "R/zzz_software_identity_integration.R"
      - "docs/reproducibility.md"
      - "scripts/validate_release_metadata.R"
      - "scripts/validate_license_metadata.R"
      - "tests/testthat/test-release-metadata-contract.R"
      - "tests/testthat/test-license-metadata-contract.R"
      - ".github/workflows/release-metadata.yml"
  push:
    branches: [main]
    paths:
      - "DESCRIPTION"
      - "LICENSE"
      - "CITATION.cff"
      - "codemeta.json"
      - "inst/CITATION"
      - "inst/metadata/software-identity.json"
      - "R/software_identity.R"
      - "R/zzz_software_identity_integration.R"
      - "docs/reproducibility.md"
      - "scripts/validate_release_metadata.R"
      - "scripts/validate_license_metadata.R"
      - "tests/testthat/test-release-metadata-contract.R"
      - "tests/testthat/test-license-metadata-contract.R"
      - ".github/workflows/release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install metadata validators
        run: |
          Rscript -e 'install.packages(c("jsonlite", "yaml"))'
          python -m pip install --disable-pip-version-check cffconvert

      - name: Validate CFF schema
        run: cffconvert --validate

      - name: Validate JSON syntax
        run: |
          python -m json.tool codemeta.json >/dev/null
          python -m json.tool inst/metadata/software-identity.json >/dev/null

      - name: Validate metadata consistency
        env:
          POPGENVCF_METADATA_EVIDENCE: artifacts/release-metadata-validation.json
        run: Rscript scripts/validate_release_metadata.R

      - name: Validate LICENSE consistency
        env:
          POPGENVCF_LICENSE_METADATA_EVIDENCE: artifacts/license-metadata-validation.json
        run: Rscript scripts/validate_license_metadata.R

      - name: Upload metadata validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-validation
          path: |
            artifacts/release-metadata-validation.json
            artifacts/license-metadata-validation.json
          if-no-files-found: warn
          retention-days: 14
