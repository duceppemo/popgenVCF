name: Canonical real-data production validation

on:
  pull_request:
    paths:
      - ".github/workflows/canonical-real-data.yml"
      - "inst/scripts/canonical_production_execution.R"
      - "inst/scripts/canonical_production_bcftools.R"
      - "inst/scripts/canonical_production_checksum.R"
      - "inst/scripts/canonical_autosomal_baseline.R"
      - "R/canonical_1000g_chrY.R"
      - "scripts/run-approved-canonical-validation.R"
      - "scripts/run-autosomal-baseline-proposal.R"
      - "tests/testthat/helper-canonical-production-execution.R"
      - "tests/testthat/test-canonical-autosomal-baseline.R"
      - "tests/testthat/test-canonical-production-execution.R"
      - "tests/testthat/test-canonical-production-execution-index-fallback.R"
      - "docs/developer/canonical-autosomal-baseline-proposal.md"
      - "docs/developer/canonical-production-execution.md"
      - "docs/CANONICAL_REAL_DATA_BASELINES.md"
      - "docs/ROADMAP.md"
      - "inst/doc/ROADMAP.md"
      - "docs/FIRST_APPROVED_CANONICAL_DATASET.md"
      - "NEWS.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/canonical-real-data.yml"
      - "inst/scripts/canonical_production_execution.R"
      - "inst/scripts/canonical_production_bcftools.R"
      - "inst/scripts/canonical_production_checksum.R"
      - "inst/scripts/canonical_autosomal_baseline.R"
      - "R/canonical_1000g_chrY.R"
      - "scripts/run-approved-canonical-validation.R"
      - "scripts/run-autosomal-baseline-proposal.R"
      - "tests/testthat/helper-canonical-production-execution.R"
      - "tests/testthat/test-canonical-autosomal-baseline.R"
      - "tests/testthat/test-canonical-production-execution.R"
      - "tests/testthat/test-canonical-production-execution-index-fallback.R"
      - "docs/developer/canonical-autosomal-baseline-proposal.md"
      - "docs/developer/canonical-production-execution.md"
      - "docs/CANONICAL_REAL_DATA_BASELINES.md"
      - "docs/ROADMAP.md"
      - "inst/doc/ROADMAP.md"
      - "docs/FIRST_APPROVED_CANONICAL_DATASET.md"
      - "NEWS.md"
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: Git ref or full commit SHA to execute
        required: false
        default: main
        type: string
      candidate_id:
        description: Stable production execution identifier
        required: false
        default: 0.10.0-production-1
        type: string
      confirm_production:
        description: Download and execute the approved canonical real-data workflow
        required: true
        default: false
        type: boolean
      dataset:
        description: Approved canonical dataset to execute
        required: true
        default: chr22
        type: choice
        options:
          - chr22
          - chrY

permissions:
  contents: read

concurrency:
  group: canonical-production-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  contract:
    name: Validate production execution contract
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Resolve validation revision
        id: candidate
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.candidate_ref }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ref="${REQUESTED_REF:-main}"
          else
            ref="${GITHUB_SHA}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: Check out validation revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ steps.candidate.outputs.ref }}
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: any::testthat
          needs: check

      - name: Install candidate package
        run: R CMD INSTALL .

      - name: Test production execution contract
        shell: bash
        run: |
          set -o pipefail
          Rscript -e 'testthat::test_dir(
            "tests/testthat",
            filter = "canonical-(production-execution|autosomal-baseline)",
            reporter = "summary"
          )' 2>&1 | tee canonical-production-contract-tests.log

      - name: Upload contract-test log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: canonical-production-contract-tests
          path: canonical-production-contract-tests.log
          if-no-files-found: error
          retention-days: 14

  production:
    name: Execute approved canonical dataset
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_production == true
    needs: contract
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Resolve production candidate
        id: candidate
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.candidate_ref }}
          REQUESTED_ID: ${{ inputs.candidate_id }}
        run: |
          set -euo pipefail
          ref="${REQUESTED_REF:-main}"
          candidate_id="${REQUESTED_ID:-0.10.0-production-1}"
          test -n "$candidate_id"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "candidate_id=${candidate_id}" >> "$GITHUB_OUTPUT"

      - name: Check out exact candidate revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ steps.candidate.outputs.ref }}
          fetch-depth: 0

      - name: Install bcftools and tabix
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bcftools tabix
          bcftools --version

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          needs: check

      - name: Install exact candidate package
        run: R CMD INSTALL .

      - name: Execute candidate-bound canonical validation
        id: execute
        shell: bash
        env:
          CANDIDATE_ID: ${{ steps.candidate.outputs.candidate_id }}
        run: |
          set -euo pipefail
          candidate_commit="$(git rev-parse HEAD)"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          data_dir="${RUNNER_TEMP}/popgenvcf-canonical-source"
          evidence_dir="${GITHUB_WORKSPACE}/canonical-production-evidence"

          Rscript scripts/run-approved-canonical-validation.R \
            "$evidence_dir" \
            "$data_dir" \
            "$CANDIDATE_ID" \
            "$candidate_commit" \
            "$generated_at" \
            --dataset="${{ inputs.dataset }}" \
            --allow-download \
            --verbose \
            2>&1 | tee canonical-production-run.log

          printf '%s\n' "$candidate_commit" > canonical-production-candidate-sha.txt
          sha256sum canonical-production-run.log \
            canonical-production-candidate-sha.txt \
            > canonical-production-run-SHA256SUMS.txt
          echo "commit=${candidate_commit}" >> "$GITHUB_OUTPUT"
          echo "evidence_dir=${evidence_dir}" >> "$GITHUB_OUTPUT"

      - name: Execute autosomal baseline proposal
        if: inputs.dataset == 'chr22'
        id: baseline
        shell: bash
        env:
          CANDIDATE_ID: ${{ steps.candidate.outputs.candidate_id }}
          CANDIDATE_COMMIT: ${{ steps.execute.outputs.commit }}
          EVIDENCE_DIR: ${{ steps.execute.outputs.evidence_dir }}
        run: |
          set -euo pipefail
          generated_at="$(jq -r '.generated_at' "$EVIDENCE_DIR/canonical-production-execution.json")"
          data_dir="${RUNNER_TEMP}/popgenvcf-canonical-source"
          work_dir="${RUNNER_TEMP}/popgenvcf-autosomal-baseline-work"
          baseline_dir="${GITHUB_WORKSPACE}/autosomal-baseline-proposal"

          Rscript scripts/run-autosomal-baseline-proposal.R \
            "$baseline_dir" \
            "$work_dir" \
            "$data_dir" \
            "$CANDIDATE_ID" \
            "$CANDIDATE_COMMIT" \
            "$generated_at" \
            2>&1 | tee autosomal-baseline-run.log

          sha256sum autosomal-baseline-run.log \
            > autosomal-baseline-run-SHA256SUMS.txt
          echo "baseline_dir=${baseline_dir}" >> "$GITHUB_OUTPUT"

      - name: Verify candidate identity and gate boundary
        shell: bash
        env:
          CANDIDATE_COMMIT: ${{ steps.execute.outputs.commit }}
          EVIDENCE_DIR: ${{ steps.execute.outputs.evidence_dir }}
          BASELINE_DIR: ${{ steps.baseline.outputs.baseline_dir }}
          DATASET: ${{ inputs.dataset }}
        run: |
          set -euo pipefail
          package_version="$(awk -F': *' '$1 == "Version" {print $2}' DESCRIPTION)"
          test "$(jq -r '.git_commit' "$EVIDENCE_DIR/canonical-production-execution.json")" = "$CANDIDATE_COMMIT"
          test "$(jq -r '.package_version' "$EVIDENCE_DIR/canonical-production-execution.json")" = "$package_version"
          test "$(jq -r '.status' "$EVIDENCE_DIR/canonical-production-execution.json")" = "passed"
          test "$(jq -r '.gate_states.canonical_validation' "$EVIDENCE_DIR/canonical-production-execution.json")" = "passed"
          test "$(jq -r '.gate_states.production_baseline' "$EVIDENCE_DIR/canonical-production-execution.json")" = "not_run"
          test "$(jq -r '.gate_states.external_concordance' "$EVIDENCE_DIR/canonical-production-execution.json")" = "not_run"
          test "$(jq -r '.gate_id' "$EVIDENCE_DIR/canonical-validation-gate-record.json")" = "canonical_validation"
          test "$(jq -r '.status' "$EVIDENCE_DIR/canonical-validation-gate-record.json")" = "passed"
          test "$(jq -r '.data_retention.raw_dataset_in_evidence_bundle' "$EVIDENCE_DIR/canonical-production-execution.json")" = "false"
          ! find "$EVIDENCE_DIR" -type f \( -name '*.vcf' -o -name '*.vcf.gz' -o -name '*.tbi' \) -print -quit | grep -q .
          (
            cd "$EVIDENCE_DIR"
            sha256sum --check canonical-production-SHA256SUMS.txt
          )
          sha256sum --check canonical-production-run-SHA256SUMS.txt
          if [[ "$DATASET" == "chr22" ]]; then
            test "$(jq -r '.git_commit' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "$CANDIDATE_COMMIT"
            test "$(jq -r '.package_version' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "$package_version"
            test "$(jq -r '.approval' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "proposed"
            test "$(jq -r '.production_baseline_gate' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "not_passed"
            test "$(jq -r '.metric_count' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "6"
            test "$(jq -r '.raw_genotype_data_in_evidence' "$BASELINE_DIR/autosomal-baseline-proposal-record.json")" = "false"
            test "$(jq -r '.approval' "$BASELINE_DIR/autosomal-baseline-proposal.json")" = "proposed"
            ! find "$BASELINE_DIR" -type f \( -name '*.vcf' -o -name '*.vcf.gz' -o -name '*.tbi' -o -name '*.gds' \) -print -quit | grep -q .
            (
              cd "$BASELINE_DIR"
              sha256sum --check autosomal-baseline-SHA256SUMS.txt
            )
            sha256sum --check autosomal-baseline-run-SHA256SUMS.txt
          fi

      - name: Write workflow summary
        shell: bash
        env:
          CANDIDATE_COMMIT: ${{ steps.execute.outputs.commit }}
          EVIDENCE_DIR: ${{ steps.execute.outputs.evidence_dir }}
          DATASET: ${{ inputs.dataset }}
        run: |
          {
            echo "## Canonical production execution"
            echo
            echo "- Candidate commit: \`$CANDIDATE_COMMIT\`"
            echo "- Dataset: \`$(jq -r '.dataset.id + " " + .dataset.version' "$EVIDENCE_DIR/canonical-production-execution.json")\`"
            echo "- Canonical validation: **passed**"
            if [[ "$DATASET" == "chr22" ]]; then
              echo "- Quantitative baseline: **proposed; scientific approval required**"
              echo "- Production baseline gate: **not passed**"
            else
              echo "- Production baseline: **not run**"
            fi
            echo "- External concordance: **not run**"
            echo "- Release authorization: **not granted**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload candidate-bound evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: canonical-production-evidence
          path: |
            canonical-production-evidence/
            canonical-production-run.log
            canonical-production-candidate-sha.txt
            canonical-production-run-SHA256SUMS.txt
            autosomal-baseline-proposal/
            autosomal-baseline-run.log
            autosomal-baseline-run-SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
