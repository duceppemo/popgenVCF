name: Public API contract

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Restore canonical baseline
        shell: bash
        run: |
          set -euo pipefail
          test -f inst/api-contract/public-api-baseline.tsv.gz.b64
          test -f inst/api-contract/public-api-baseline.dcf
          base64 --decode inst/api-contract/public-api-baseline.tsv.gz.b64 | gzip --decompress > inst/api-contract/public-api-baseline.tsv
          expected_digest="$(sed -n 's/^Snapshot-SHA256: //p' inst/api-contract/public-api-baseline.dcf)"
          actual_digest="$(sha256sum inst/api-contract/public-api-baseline.tsv | cut -d' ' -f1)"
          test -n "$expected_digest"
          if [[ "$expected_digest" != "$actual_digest" ]]; then
            echo "Canonical baseline SHA-256 mismatch: expected $expected_digest, got $actual_digest" >&2
            exit 1
          fi

      - name: Generate current contract
        run: |
          mkdir -p artifacts/public-api-contract
          Rscript tools/update-public-api-baseline.R . artifacts/public-api-contract/public-api-current.tsv artifacts/public-api-contract/public-api-current.dcf

      - name: Verify canonical baseline
        run: |
          Rscript tools/check-public-api-contract.R . artifacts/public-api-contract inst/api-contract/public-api-baseline.tsv
          Rscript - <<'RSCRIPT'
          metadata <- read.dcf("inst/api-contract/public-api-baseline.dcf")
          expected_version <- metadata[1L, "Version"]
          installed_version <- as.character(utils::packageVersion("popgenVCF"))
          if (!identical(expected_version, installed_version)) {
            stop("Baseline version ", expected_version, " does not match installed package version ", installed_version)
          }
          expected_entries <- as.integer(metadata[1L, "Entries"])
          baseline <- utils::read.delim("inst/api-contract/public-api-baseline.tsv", stringsAsFactors = FALSE, check.names = FALSE, na.strings = "")
          if (!identical(expected_entries, nrow(baseline))) {
            stop("Baseline entry count mismatch: metadata declares ", expected_entries, ", file contains ", nrow(baseline))
          }
          RSCRIPT

      - name: Upload API contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-api-contract
          path: artifacts/public-api-contract
          if-no-files-found: warn
