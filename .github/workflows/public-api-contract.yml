name: Public API contract

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Restore canonical baseline
        shell: bash
        run: |
          test -f inst/api-contract/public-api-baseline.tsv.gz.b64
          test -f inst/api-contract/public-api-baseline.dcf
          base64 --decode inst/api-contract/public-api-baseline.tsv.gz.b64 | gzip --decompress > inst/api-contract/public-api-baseline.tsv
          expected_digest="$(sed -n 's/^Snapshot-SHA256: //p' inst/api-contract/public-api-baseline.dcf)"
          actual_digest="$(sha256sum inst/api-contract/public-api-baseline.tsv | cut -d' ' -f1)"
          test -n "$expected_digest"
          test "$expected_digest" = "$actual_digest"

      - name: Generate current contract
        run: |
          mkdir -p artifacts/public-api-contract
          Rscript tools/update-public-api-baseline.R . artifacts/public-api-contract/public-api-current.tsv artifacts/public-api-contract/public-api-current.dcf

      - name: Verify canonical baseline
        shell: bash
        run: |
          Rscript tools/check-public-api-contract.R . artifacts/public-api-contract inst/api-contract/public-api-baseline.tsv
          expected_version="$(sed -n 's/^Version: //p' inst/api-contract/public-api-baseline.dcf)"
          installed_version="$(Rscript -e 'cat(as.character(utils::packageVersion("popgenVCF")))')"
          expected_entries="$(sed -n 's/^Entries: //p' inst/api-contract/public-api-baseline.dcf)"
          actual_entries="$(($(wc -l < inst/api-contract/public-api-baseline.tsv) - 1))"
          test "$expected_version" = "$installed_version"
          test "$expected_entries" = "$actual_entries"

      - name: Upload API contract evidence
        uses: actions/upload-artifact@v4
        with:
          name: public-api-contract
          path: artifacts/public-api-contract
          if-no-files-found: error
