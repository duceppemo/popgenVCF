name: Public API contract

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  public-api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Generate current contract
        run: |
          mkdir -p artifacts/public-api-contract
          Rscript tools/update-public-api-baseline.R . artifacts/public-api-contract/public-api-current.tsv artifacts/public-api-contract/public-api-current.dcf

      - name: Refresh canonical baseline for PR 287
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 287 &&
          github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          current="artifacts/public-api-contract/public-api-current.tsv"
          baseline="inst/api-contract/public-api-baseline.tsv"
          cp "$current" "$baseline"
          gzip --no-name --stdout "$baseline" | base64 --wrap=76 > inst/api-contract/public-api-baseline.tsv.gz.b64
          digest="$(sha256sum "$baseline" | cut -d' ' -f1)"
          entries="$(( $(wc -l < "$baseline") - 1 ))"
          cat > inst/api-contract/public-api-baseline.dcf <<EOF
          Package: popgenVCF
          Version: 0.10.0
          Contract-Format: 1
          Entries: ${entries}
          Snapshot-Encoding: gzip+base64
          Snapshot-SHA256: ${digest}
          EOF

      - name: Publish refreshed baseline to PR 287
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 287 &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inst/api-contract/public-api-baseline.tsv.gz.b64 inst/api-contract/public-api-baseline.dcf
          if git diff --cached --quiet; then
            echo "Canonical API baseline is already current."
          else
            git commit -m "Refresh canonical public API baseline"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Verify canonical baseline
        run: |
          test -f inst/api-contract/public-api-baseline.tsv
          Rscript tools/check-public-api-contract.R . artifacts/public-api-contract inst/api-contract/public-api-baseline.tsv
          Rscript - <<'RSCRIPT'
          metadata <- read.dcf("inst/api-contract/public-api-baseline.dcf")
          expected_version <- unname(metadata[1L, "Version"])
          installed_version <- as.character(utils::packageVersion("popgenVCF"))
          if (is.na(expected_version) || expected_version != installed_version) {
            stop("Baseline version ", expected_version, " does not match installed package version ", installed_version)
          }
          expected_entries <- suppressWarnings(as.integer(unname(metadata[1L, "Entries"])))
          baseline <- utils::read.delim(
            "inst/api-contract/public-api-baseline.tsv",
            stringsAsFactors = FALSE,
            check.names = FALSE,
            na.strings = "",
            quote = ""
          )
          actual_entries <- nrow(baseline)
          if (is.na(expected_entries) || expected_entries != actual_entries) {
            stop("Baseline entry count mismatch: metadata declares ", expected_entries, ", file contains ", actual_entries)
          }
          RSCRIPT

      - name: Upload API contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-api-contract
          path: artifacts/public-api-contract
          if-no-files-found: warn
