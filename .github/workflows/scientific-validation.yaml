name: scientific-validation
on:
  push:
    paths: ["R/**", "tests/**", "validation/**", "inst/extdata/validation/**"]
  pull_request:
  workflow_dispatch:
jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
      - run: R CMD INSTALL .
      - run: Rscript -e 'x <- popgenVCF::run_scientific_validation(integration=TRUE); print(x$checks); stopifnot(x$passed)'
      - run: Rscript -e 'x <- popgenVCF::run_population_structure_validation(integration=TRUE); print(x$checks); stopifnot(x$passed)'
