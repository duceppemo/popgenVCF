name: Scientific validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scientific-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: |
            any::BiocManager
            any::rcmdcheck
          needs: check

      - name: Install popgenVCF
        run: R CMD INSTALL .

      - name: Run deterministic validation suites
        shell: Rscript {0}
        run: |
          dir.create("validation-artifacts", showWarnings = FALSE)

          core <- popgenVCF::run_scientific_validation(
            integration = TRUE,
            threads = 4
          )

          structure <- popgenVCF::run_population_structure_validation(
            integration = TRUE
          )

          data.table::fwrite(
            core$checks,
            "validation-artifacts/scientific-validation.tsv",
            sep = "\t"
          )

          data.table::fwrite(
            structure$checks,
            "validation-artifacts/population-structure-validation.tsv",
            sep = "\t"
          )

          writeLines(
            capture.output(sessionInfo()),
            "validation-artifacts/session-info.txt"
          )

          print(core$checks)
          print(structure$checks)

          stopifnot(core$passed, structure$passed)

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scientific-validation-${{ github.sha }}
          path: validation-artifacts/
          if-no-files-found: warn
          retention-days: 30
