name: quick-benchmark
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'R/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yaml'
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: any::remotes
      - name: Install package
        id: install
        shell: bash
        run: |
          set +e
          R CMD INSTALL . > install.log 2>&1
          status=$?
          cat install.log
          exit "$status"
      - name: Upload installation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-install-log
          path: install.log
      - name: Run quick benchmark
        env:
          POPGENVCF_BENCHMARK_QUICK: 'true'
        run: Rscript benchmarks/run-benchmarks.R benchmarks/results/quick.tsv
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quick-benchmark
          path: benchmarks/results/quick.tsv
