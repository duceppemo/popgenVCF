name: Scientific release integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scientific-release-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      POPGENVCF_RELEASE_DATE: '2026-07-18'
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: |
            any::BiocManager
            any::rcmdcheck
          needs: check

      - name: Install popgenVCF
        run: R CMD INSTALL .

      - name: Build and verify deterministic scientific releases
        run: |
          Rscript scripts/build_scientific_release_integration.R \
            scientific-release-integration \
            "integration-${GITHUB_SHA::12}"

      - name: Package verified release
        shell: bash
        run: |
          tar -czf scientific-release-integration.tar.gz \
            -C scientific-release-integration run-a/scientific-release run-a/records integration-summary.json determinism-comparison.tsv
          sha256sum scientific-release-integration.tar.gz > scientific-release-integration.sha256

      - name: Upload integration artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scientific-release-integration-${{ github.sha }}
          path: |
            scientific-release-integration.tar.gz
            scientific-release-integration.sha256
            scientific-release-integration/integration-summary.json
            scientific-release-integration/determinism-comparison.tsv
            scientific-release-integration/run-a/scientific-release/
            scientific-release-integration/run-a/records/
          if-no-files-found: error
          retention-days: 90
